name: Create release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create, such as v0.13.0
        required: true
        type: string
      release_name:
        description: Optional release title; defaults to the tag
        required: false
        type: string
      prerelease:
        description: Mark this as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build EAC interop reference
        shell: powershell
        run: .\Scripts\BuildInteropReference.ps1

      - name: Build plugin
        shell: powershell
        run: >-
          .\Scripts\Build.ps1
          -InteropPath Artifacts\Reference\Interop.HelperFunctionsLib.dll

      - name: Run tests
        shell: powershell
        run: >-
          .\Scripts\Test.ps1
          -InteropPath Artifacts\Reference\Interop.HelperFunctionsLib.dll

      - name: Package release
        shell: powershell
        run: .\Scripts\Package.ps1

      - name: Create checksum
        shell: powershell
        run: |
          $hash = (Get-FileHash -LiteralPath .\Artifacts\EACEnhancements.zip `
            -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash *EACEnhancements.zip" | Set-Content `
            -LiteralPath .\Artifacts\EACEnhancements.sha256 `
            -Encoding Ascii

      - name: Create GitHub release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_NAME: ${{ inputs.release_name }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          $title = if ([string]::IsNullOrWhiteSpace($env:RELEASE_NAME)) {
            $env:RELEASE_TAG
          } else {
            $env:RELEASE_NAME
          }
          $arguments = @(
            'release', 'create', $env:RELEASE_TAG,
            '.\Artifacts\EACEnhancements.zip',
            '.\Artifacts\EACEnhancements.sha256',
            '--repo', $env:GITHUB_REPOSITORY,
            '--target', $env:GITHUB_SHA,
            '--title', $title,
            '--generate-notes'
          )
          if ($env:PRERELEASE -eq 'true') {
            $arguments += '--prerelease'
          }
          & gh @arguments
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub release creation failed with exit code $LASTEXITCODE."
          }
